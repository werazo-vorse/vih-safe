kind = "web"
previewPath = "/"
title = "VIHSafe Manizales"
version = "1.0.0"
id = "artifacts/vihsafe"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25685

[services.development]
run = "pnpm --filter @workspace/vihsafe run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vihsafe", "run", "build" ]
publicDir = "artifacts/vihsafe/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25685"
BASE_PATH = "/"
