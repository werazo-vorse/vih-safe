openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: VIHSafe Manizales API - HIV risk assessment, AI chatbot, and education
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: assessment
    description: HIV risk assessment based on adapted MySTIRisk instrument
  - name: chatbot
    description: AI-powered HIV/STI educational chatbot
  - name: education
    description: Interactive educational content
  - name: stats
    description: Aggregate statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /assessment/questions:
    get:
      operationId: getQuestions
      tags: [assessment]
      summary: Get the validated questionnaire (12 fixed + 7 conditional items)
      responses:
        "200":
          description: Question list
          content:
            application/json:
              schema:
                type: object
                required: [questions]
                properties:
                  questions:
                    type: array
                    items:
                      $ref: "#/components/schemas/Question"

  /assessment/submit:
    post:
      operationId: submitAssessment
      tags: [assessment]
      summary: Submit responses and receive risk classification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssessmentSubmission"
      responses:
        "200":
          description: Risk classification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssessmentResult"

  /assessment/recent:
    get:
      operationId: getRecentAssessments
      tags: [assessment]
      summary: Anonymized recent assessments (last 10)
      responses:
        "200":
          description: Recent anonymized results
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/RecentAssessment"

  /stats/summary:
    get:
      operationId: getStatsSummary
      tags: [stats]
      summary: Aggregate platform statistics
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"

  /chatbot/message:
    post:
      operationId: sendChatMessage
      tags: [chatbot]
      summary: Send a message to the AI educational chatbot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Chatbot reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  /education/modules:
    get:
      operationId: getEducationModules
      tags: [education]
      summary: List interactive educational modules
      responses:
        "200":
          description: Modules list
          content:
            application/json:
              schema:
                type: object
                required: [modules]
                properties:
                  modules:
                    type: array
                    items:
                      $ref: "#/components/schemas/EducationModule"

  /education/modules/{moduleId}:
    get:
      operationId: getEducationModule
      tags: [education]
      summary: Get a single educational module with full content
      parameters:
        - name: moduleId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Module detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EducationModuleDetail"

  /education/quiz/submit:
    post:
      operationId: submitQuiz
      tags: [education]
      summary: Submit answers for an educational quiz
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizSubmission"
      responses:
        "200":
          description: Quiz result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResult"

  /resources/clinics:
    get:
      operationId: getClinics
      tags: [education]
      summary: List of testing clinics in Manizales
      responses:
        "200":
          description: Clinics
          content:
            application/json:
              schema:
                type: object
                required: [clinics]
                properties:
                  clinics:
                    type: array
                    items:
                      $ref: "#/components/schemas/Clinic"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    QuestionOption:
      type: object
      required: [value, label]
      properties:
        value:
          type: string
        label:
          type: string

    Question:
      type: object
      required: [id, order, text, type, domain, conditional]
      properties:
        id:
          type: string
        order:
          type: integer
        text:
          type: string
        helpText:
          type: string
        type:
          type: string
          enum: [single, multi, number, country]
        domain:
          type: string
          enum: [demographic, behavioral, epidemiological, clinical]
        conditional:
          type: boolean
        showIf:
          type: object
          required: [questionId, equals]
          properties:
            questionId:
              type: string
            equals:
              type: array
              items:
                type: string
        options:
          type: array
          items:
            $ref: "#/components/schemas/QuestionOption"
        defaultValue:
          type: string

    AnswerValue:
      oneOf:
        - type: string
        - type: number
        - type: array
          items:
            type: string

    AssessmentAnswer:
      type: object
      required: [questionId, value]
      properties:
        questionId:
          type: string
        value:
          $ref: "#/components/schemas/AnswerValue"

    AssessmentSubmission:
      type: object
      required: [answers]
      properties:
        answers:
          type: array
          items:
            $ref: "#/components/schemas/AssessmentAnswer"

    DomainScore:
      type: object
      required: [domain, score, maxScore]
      properties:
        domain:
          type: string
        score:
          type: number
        maxScore:
          type: number

    RiskFactor:
      type: object
      required: [label, severity]
      properties:
        label:
          type: string
        severity:
          type: string
          enum: [low, moderate, high]

    AssessmentResult:
      type: object
      required: [id, riskLevel, riskScore, summary, recommendations, factors, domainScores, createdAt]
      properties:
        id:
          type: string
        riskLevel:
          type: string
          enum: [low, moderate, high, very_high]
        riskScore:
          type: number
        summary:
          type: string
        recommendations:
          type: array
          items:
            type: string
        factors:
          type: array
          items:
            $ref: "#/components/schemas/RiskFactor"
        domainScores:
          type: array
          items:
            $ref: "#/components/schemas/DomainScore"
        createdAt:
          type: string
          format: date-time

    RecentAssessment:
      type: object
      required: [id, riskLevel, ageRange, createdAt]
      properties:
        id:
          type: string
        riskLevel:
          type: string
        ageRange:
          type: string
        createdAt:
          type: string
          format: date-time

    StatsSummary:
      type: object
      required: [totalAssessments, riskDistribution, modulesCompleted, chatMessages]
      properties:
        totalAssessments:
          type: integer
        riskDistribution:
          type: array
          items:
            type: object
            required: [level, count]
            properties:
              level:
                type: string
              count:
                type: integer
        modulesCompleted:
          type: integer
        chatMessages:
          type: integer

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string

    ChatRequest:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"

    ChatResponse:
      type: object
      required: [reply]
      properties:
        reply:
          type: string
        suggestions:
          type: array
          items:
            type: string

    EducationModule:
      type: object
      required: [id, title, description, durationMinutes, category, icon]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        durationMinutes:
          type: integer
        category:
          type: string
          enum: [prevention, transmission, testing, treatment, stigma]
        icon:
          type: string

    EducationSection:
      type: object
      required: [heading, body]
      properties:
        heading:
          type: string
        body:
          type: string

    EducationFact:
      type: object
      required: [statement, isMyth]
      properties:
        statement:
          type: string
        isMyth:
          type: boolean
        explanation:
          type: string

    QuizQuestion:
      type: object
      required: [id, prompt, options, correctOption]
      properties:
        id:
          type: string
        prompt:
          type: string
        options:
          type: array
          items:
            type: string
        correctOption:
          type: integer
        explanation:
          type: string

    EducationModuleDetail:
      type: object
      required: [id, title, description, sections, facts, quiz]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        sections:
          type: array
          items:
            $ref: "#/components/schemas/EducationSection"
        facts:
          type: array
          items:
            $ref: "#/components/schemas/EducationFact"
        quiz:
          type: array
          items:
            $ref: "#/components/schemas/QuizQuestion"

    QuizAnswer:
      type: object
      required: [questionId, selectedOption]
      properties:
        questionId:
          type: string
        selectedOption:
          type: integer

    QuizSubmission:
      type: object
      required: [moduleId, answers]
      properties:
        moduleId:
          type: string
        answers:
          type: array
          items:
            $ref: "#/components/schemas/QuizAnswer"

    QuizResult:
      type: object
      required: [score, total, passed, feedback]
      properties:
        score:
          type: integer
        total:
          type: integer
        passed:
          type: boolean
        feedback:
          type: array
          items:
            type: object
            required: [questionId, correct]
            properties:
              questionId:
                type: string
              correct:
                type: boolean
              explanation:
                type: string

    Clinic:
      type: object
      required: [id, name, address, phone, services, hours]
      properties:
        id:
          type: string
        name:
          type: string
        address:
          type: string
        phone:
          type: string
        services:
          type: array
          items:
            type: string
        hours:
          type: string
        free:
          type: boolean
